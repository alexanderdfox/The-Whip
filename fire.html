<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title></title>
  <style>
    * { margin: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #020204; }
    canvas { display: block; width: 100%; height: 100%; }
  </style>
  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/"
    }
  }
  </script>
</head>
<body>
  <script type="module">
    import * as THREE from "three";
    import { OrbitControls } from "three/addons/controls/OrbitControls.js";

    const canvas = document.createElement("canvas");
    document.body.appendChild(canvas);

    const CYCLE = 32;

    function uT(now) {
      return (now % (CYCLE * 1000)) / (CYCLE * 1000);
    }

    function smooth(a, b, t) {
      const x = Math.max(0, Math.min(1, (t - a) / (b - a)));
      return x * x * (3 - 2 * x);
    }

    function beat(u) {
      return {
        dusk: smooth(0, 0.08, u),
        seeker: smooth(0.05, 0.18, u),
        sit: smooth(0.14, 0.26, u),
        gather: smooth(0.2, 0.42, u),
        tales: smooth(0.38, 0.62, u),
        shadows: smooth(0.48, 0.72, u),
        depart: smooth(0.62, 0.82, u),
        coal: smooth(0.76, 0.92, u),
        linger: smooth(0.88, 1, u),
      };
    }

    const scene = new THREE.Scene();
    const bg = new THREE.Color(0x05040a);
    scene.background = bg.clone();
    scene.fog = new THREE.FogExp2(0x0a0812, 0.038);

    const renderer = new THREE.WebGLRenderer({
      canvas,
      antialias: true,
      powerPreference: "high-performance",
    });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight, false);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 0.68;
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;

    const camera = new THREE.PerspectiveCamera(40, innerWidth / innerHeight, 0.1, 200);
    camera.position.set(0.4, 1.55, 4.2);

    const controls = new OrbitControls(camera, canvas);
    controls.target.set(0, 0.45, 0);
    controls.enableDamping = true;
    controls.dampingFactor = 0.055;
    controls.minDistance = 2.2;
    controls.maxDistance = 11;
    controls.maxPolarAngle = Math.PI * 0.48;

    const moon = new THREE.DirectionalLight(0x9aa8d8, 0.22);
    moon.position.set(-3, 8, -2);
    scene.add(moon);

    const fireLight = new THREE.PointLight(0xff8a44, 2.4, 14, 1.9);
    fireLight.position.set(0, 0.55, 0);
    fireLight.castShadow = true;
    fireLight.shadow.mapSize.set(1024, 1024);
    scene.add(fireLight);

    const rim = new THREE.HemisphereLight(0x2a2840, 0x080604, 0.35);
    scene.add(rim);

    const ground = new THREE.Mesh(
      new THREE.CircleGeometry(9, 64),
      new THREE.MeshStandardMaterial({
        color: 0x1a1815,
        roughness: 0.94,
        metalness: 0,
      })
    );
    ground.rotation.x = -Math.PI / 2;
    ground.receiveShadow = true;
    scene.add(ground);

    const ring = new THREE.Mesh(
      new THREE.RingGeometry(2.2, 9.2, 48, 1),
      new THREE.MeshStandardMaterial({
        color: 0x0c0a0c,
        roughness: 1,
        metalness: 0,
      })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.y = 0.002;
    ring.receiveShadow = true;
    scene.add(ring);

    const logMat = new THREE.MeshStandardMaterial({
      color: 0x1a1410,
      roughness: 0.9,
      metalness: 0.05,
      emissive: new THREE.Color(0x1a0804),
      emissiveIntensity: 0.08,
    });
    const logs = new THREE.Group();
    for (let i = 0; i < 5; i++) {
      const log = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.1, 0.85, 8), logMat);
      log.rotation.z = Math.PI / 2;
      log.rotation.y = (i / 5) * Math.PI * 0.9;
      log.position.set(Math.cos(log.rotation.y) * 0.22, 0.12, Math.sin(log.rotation.y) * 0.22);
      log.castShadow = true;
      log.receiveShadow = true;
      logs.add(log);
    }
    scene.add(logs);

    const starGeo = new THREE.BufferGeometry();
    const starPos = [];
    for (let i = 0; i < 900; i++) {
      const r = 35 + Math.random() * 45;
      const th = Math.random() * Math.PI * 2;
      const ph = Math.acos(0.35 + Math.random() * 0.55);
      starPos.push(
        r * Math.sin(ph) * Math.cos(th),
        r * Math.cos(ph) + 8,
        r * Math.sin(ph) * Math.sin(th)
      );
    }
    starGeo.setAttribute("position", new THREE.Float32BufferAttribute(starPos, 3));
    const stars = new THREE.Points(
      starGeo,
      new THREE.PointsMaterial({
        color: 0xc8d4ff,
        size: 0.045,
        transparent: true,
        opacity: 0.75,
        depthWrite: false,
      })
    );
    scene.add(stars);

    const treeMat = new THREE.MeshStandardMaterial({
      color: 0x060504,
      roughness: 0.98,
      metalness: 0,
    });
    const trees = new THREE.InstancedMesh(
      new THREE.CylinderGeometry(0.12, 0.22, 2.8, 6, 1),
      treeMat,
      48
    );
    trees.castShadow = true;
    const td = new THREE.Object3D();
    let ti = 0;
    for (let i = 0; i < 48; i++) {
      const ang = (i / 48) * Math.PI * 2 + (i % 3) * 0.2;
      const r = 3.8 + (i % 5) * 0.35 + Math.random() * 0.4;
      td.position.set(Math.cos(ang) * r, 1.35, Math.sin(ang) * r);
      td.scale.setScalar(0.85 + Math.random() * 0.5);
      td.rotation.y = ang + Math.random() * 0.3;
      td.rotation.z = (Math.random() - 0.5) * 0.08;
      td.updateMatrix();
      trees.setMatrixAt(ti++, td.matrix);
    }
    trees.instanceMatrix.needsUpdate = true;
    scene.add(trees);

    const FL = 48;
    const flameGeo = new THREE.SphereGeometry(0.08, 8, 6);
    const flameMat = new THREE.MeshBasicMaterial({
      color: 0xff6a22,
      transparent: true,
      opacity: 0.85,
      depthWrite: false,
      blending: THREE.AdditiveBlending,
    });
    const flames = new THREE.InstancedMesh(flameGeo, flameMat, FL);
    scene.add(flames);

    const SMK = 70;
    const smokeGeo = new THREE.SphereGeometry(0.12, 6, 5);
    const smokeMat = new THREE.MeshPhysicalMaterial({
      color: 0x4a4a52,
      transparent: true,
      opacity: 0.22,
      roughness: 1,
      metalness: 0,
      depthWrite: false,
    });
    const smoke = new THREE.InstancedMesh(smokeGeo, smokeMat, SMK);
    scene.add(smoke);

    function makeFigure(scale) {
      const g = new THREE.Group();
      const cloak = new THREE.Mesh(
        new THREE.ConeGeometry(0.35 * scale, 1.1 * scale, 12, 1, true),
        new THREE.MeshStandardMaterial({
          color: 0x120e18,
          roughness: 0.92,
          metalness: 0.05,
          side: THREE.DoubleSide,
        })
      );
      cloak.position.y = 0.55 * scale;
      cloak.castShadow = true;
      g.add(cloak);
      const head = new THREE.Mesh(
        new THREE.SphereGeometry(0.14 * scale, 12, 10),
        new THREE.MeshStandardMaterial({ color: 0x1a1620, roughness: 0.88 })
      );
      head.position.y = 1.05 * scale;
      head.castShadow = true;
      g.add(head);
      return g;
    }

    const seeker = makeFigure(1);
    seeker.position.set(1.35, 0, 0.6);
    seeker.rotation.y = -0.9;
    scene.add(seeker);

    const staff = new THREE.Mesh(
      new THREE.CylinderGeometry(0.03, 0.035, 1.35, 8),
      new THREE.MeshStandardMaterial({ color: 0x2a2018, roughness: 0.85 })
    );
    staff.position.set(0.42, 0.55, 0.1);
    staff.rotation.z = 0.15;
    staff.castShadow = true;
    seeker.add(staff);

    const guestAngles = [0.3, 2.1, 3.8, 5.2];
    const guests = guestAngles.map((ang) => {
      const f = makeFigure(0.92);
      const r = 1.55;
      f.position.set(Math.cos(ang) * r, 0, Math.sin(ang) * r);
      f.rotation.y = ang + Math.PI;
      f.visible = false;
      scene.add(f);
      return f;
    });

    const shadowMat = new THREE.MeshBasicMaterial({
      color: 0x000000,
      transparent: true,
      opacity: 0.42,
      depthWrite: false,
    });
    const shadowPlane = new THREE.PlaneGeometry(0.55, 1.1);
    const shadows = guests.map((g, i) => {
      const m = new THREE.Mesh(shadowPlane, shadowMat.clone());
      m.rotation.x = -Math.PI / 2;
      m.position.copy(g.position);
      m.position.y = 0.03;
      m.rotation.z = guestAngles[i];
      scene.add(m);
      return m;
    });

    const propMat = (c) =>
      new THREE.MeshStandardMaterial({
        color: c,
        roughness: 0.55,
        metalness: 0.15,
        emissive: new THREE.Color(c).multiplyScalar(0.08),
      });

    const crown = new THREE.Mesh(
      new THREE.TorusGeometry(0.08, 0.025, 8, 16),
      propMat(0x8899cc)
    );
    crown.rotation.x = Math.PI / 2;
    crown.position.set(-0.35, 0.08, 0.15);
    crown.visible = false;
    crown.castShadow = true;
    scene.add(crown);

    const book = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.05, 0.22), propMat(0x5a4a3a));
    book.position.set(0.5, 0.06, -0.28);
    book.rotation.y = 0.4;
    book.visible = false;
    book.castShadow = true;
    scene.add(book);

    const mirror = new THREE.Mesh(
      new THREE.PlaneGeometry(0.2, 0.28),
      new THREE.MeshPhysicalMaterial({
        color: 0xaab0c0,
        metalness: 0.9,
        roughness: 0.15,
        transparent: true,
        opacity: 0.92,
      })
    );
    mirror.position.set(-0.55, 0.07, -0.22);
    mirror.rotation.x = -Math.PI / 2 + 0.35;
    mirror.visible = false;
    scene.add(mirror);

    const sword = new THREE.Mesh(
      new THREE.BoxGeometry(0.06, 0.02, 0.55),
      propMat(0x6a6a72)
    );
    sword.position.set(0.15, 0.05, 0.42);
    sword.rotation.y = 0.2;
    sword.visible = false;
    sword.castShadow = true;
    scene.add(sword);

    const coal = new THREE.Mesh(
      new THREE.SphereGeometry(0.06, 12, 10),
      new THREE.MeshPhysicalMaterial({
        color: 0x1a1010,
        emissive: new THREE.Color(0xff4400),
        emissiveIntensity: 1.2,
        roughness: 0.45,
        metalness: 0.1,
      })
    );
    coal.visible = false;
    seeker.add(coal);

    const _m = new THREE.Matrix4();
    const _q = new THREE.Quaternion();
    const _p = new THREE.Vector3();
    const _s = new THREE.Vector3();
    const _ax = new THREE.Vector3(0, 1, 0);

    window.addEventListener("resize", () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight, false);
    });

    function animate(now) {
      requestAnimationFrame(animate);
      const u = uT(now);
      const b = beat(u);
      const flick = 0.85 + Math.sin(now * 0.011) * 0.12 + Math.sin(now * 0.037 + 1) * 0.08;

      if (b.depart < 0.04) {
        sword.scale.setScalar(1);
        mirror.scale.set(1, 1, 1);
      }

      fireLight.intensity = (2.1 + b.tales * 0.35) * flick;
      fireLight.color.setHSL(0.07 + flick * 0.02, 1, 0.52);

      logMat.emissiveIntensity = 0.06 + b.tales * 0.12 + flick * 0.06;

      scene.fog.density = 0.036 + b.dusk * 0.012 - b.coal * 0.006;
      stars.material.opacity = 0.45 + b.dusk * 0.35;

      let sx = 1.35 - b.seeker * 0.95 - b.sit * 0.32;
      let sz = 0.6 - b.seeker * 0.35;
      let sry = -0.9 + b.sit * 0.55;
      if (b.coal > 0.06) {
        const cw = (b.coal - 0.06) / 0.86;
        sx -= cw * 0.62;
        sz += cw * 0.18;
        sry += cw * 0.55;
      }
      seeker.position.set(sx, 0, sz);
      seeker.rotation.y = sry;

      const gVis = smooth(0.22, 0.38, u);
      for (let i = 0; i < guests.length; i++) {
        guests[i].visible = gVis > i * 0.06;
        shadows[i].visible = guests[i].visible && b.shadows > 0.05;
      }

      const arg = b.shadows * (1 - b.depart * 0.9);
      for (let i = 0; i < shadows.length; i++) {
        const sh = shadows[i];
        const wobble =
          Math.sin(now * 0.003 + i * 2.1) * 0.12 * arg +
          Math.sin(now * 0.007 + i) * 0.08 * arg;
        sh.scale.set(1 + wobble * 0.35, 1 + Math.abs(wobble) * 0.5, 1);
        sh.rotation.z = guestAngles[i] + wobble * 0.6;
        sh.material.opacity = 0.28 + arg * 0.35;
      }

      crown.visible = b.depart > 0.15 && b.linger < 0.5;
      book.visible = b.depart > 0.28 && b.linger < 0.5;
      mirror.visible = b.depart > 0.38 && b.linger < 0.5;
      sword.visible = b.depart > 0.48 && b.linger < 0.55;
      const crack = smooth(0.52, 0.66, b.depart);
      mirror.scale.set(1 - crack * 0.12, 1, 1);
      const swallow = smooth(0.56, 0.72, b.depart);
      sword.scale.setScalar(Math.max(0.001, 1 - swallow * 1.05));

      for (let i = 0; i < guests.length; i++) {
        guests[i].visible = guests[i].visible && b.depart < 0.72 + i * 0.04;
      }

      coal.visible = b.coal > 0.08;
      coal.position.set(0.55, 0.75 + Math.sin(now * 0.002) * 0.02, 0.15);
      coal.material.emissiveIntensity = 1 + b.coal * 0.8 + flick * 0.3;

      let fi = 0;
      for (let i = 0; i < FL; i++) {
        const a = (i / FL) * Math.PI * 2 + now * 0.002;
        const h = 0.15 + (i % 7) * 0.06 + Math.sin(now * 0.01 + i) * 0.08;
        const rr = 0.12 + (i % 5) * 0.03;
        _p.set(Math.cos(a) * rr * 0.6, h, Math.sin(a) * rr * 0.6);
        const sc = 0.5 + flick * 0.5 + (i % 4) * 0.12;
        _q.setFromAxisAngle(_ax, a);
        _s.set(sc, sc * (1.2 + flick * 0.2), sc);
        _m.compose(_p, _q, _s);
        flames.setMatrixAt(fi++, _m);
      }
      flames.instanceMatrix.needsUpdate = true;

      let si = 0;
      for (let i = 0; i < SMK; i++) {
        const t = ((now * 0.00012 + i * 0.17) % 1);
        const ang = i * 0.37 + now * 0.0004;
        _p.set(Math.cos(ang) * 0.15 * (1 - t), 0.35 + t * 2.8, Math.sin(ang) * 0.15 * (1 - t));
        const sc = 0.6 + t * 1.4 + (i % 3) * 0.1;
        _q.identity();
        _m.compose(_p, _q, new THREE.Vector3(sc, sc * 0.9, sc));
        smoke.setMatrixAt(si++, _m);
      }
      smoke.instanceMatrix.needsUpdate = true;
      smokeMat.opacity = 0.12 + b.tales * 0.16;

      renderer.toneMappingExposure = 0.68 + b.tales * 0.06 - b.depart * 0.04;

      controls.update();
      renderer.render(scene, camera);
    }

    requestAnimationFrame(animate);
  </script>
</body>
</html>
